city: 韶关
timezone: Asia/Shanghai
issue_title_template: "个人资讯简报 | {date} 早间"
labels:
  - daily-report
  - morning
editions:
  morning:
    title_template: "个人资讯简报 | {date} 早间"
    labels:
      - daily-report
      - morning
    subtitle: "为你整理的每日综合资讯精选"
    include_weather: true
    observation_title: "今日观察"
  noon:
    title_template: "午间轻松报 | {date}"
    labels:
      - daily-report
      - noon
      - entertainment
    subtitle: "中午适合快速刷一遍的娱乐休闲精选"
    include_weather: false
    observation_title: "午间观察"
    sections:
      - key: social
        name: 社媒热议
        emoji: 📱
      - key: memes
        name: 今日热梗
        emoji: 🤣
      - key: games
        name: 轻量游戏动向
        emoji: 🎮
      - key: picks
        name: 午间一刷
        emoji: ✨
  evening:
    title_template: "夜间玩乐报 | {date}"
    labels:
      - daily-report
      - evening
      - entertainment
    subtitle: "今晚值得一口气看完的轻松内容和热门游戏动向"
    include_weather: false
    observation_title: "夜间观察"
    sections:
      - key: games
        name: 晚间游戏热点
        emoji: 🎮
      - key: video
        name: 视频与直播热议
        emoji: 📺
      - key: night_picks
        name: 今夜玩点啥
        emoji: 🌙
      - key: memes
        name: 今日热梗回顾
        emoji: 🤣
max_topics: 4
max_items_per_topic: 6
weekly_repo_count: 8
source_profile: curated-mixed
max_items_per_hotlist: 5
max_items_per_news_section: 8
max_items_per_game_section: 8
news_freshness_days: 14
game_news_freshness_days: 21

ai:
  model: openai/LongCat-Flash-Chat
  api_base: https://api.longcat.chat/openai/v1

hotlists:
  - id: zhihu
    name: 知乎
  - id: weibo
    name: 微博
  - id: tieba
    name: 贴吧
  - id: douyin
    name: 抖音
  - id: bilibili-hot-search
    name: bilibili 热搜

english_feeds:
  - id: hacker-news
    name: Hacker News
    url: https://hnrss.org/frontpage
    max_items: 6
  - id: github-changelog
    name: GitHub Changelog
    url: https://github.blog/changelog/feed/
    max_items: 5
  - id: openai-blog
    name: OpenAI Blog
    url: https://openai.com/news/rss.xml
    max_items: 5
  - id: anthropic-news
    name: Anthropic News
    url: https://www.anthropic.com/news/rss.xml
    max_items: 5
  - id: google-ai-blog
    name: Google AI Blog
    url: https://blog.google/technology/ai/rss/
    max_items: 5
  - id: android-developers
    name: Android Developers Blog
    url: https://android-developers.googleblog.com/feeds/posts/default?alt=rss
    max_items: 4
  - id: simon-willison
    name: Simon Willison
    url: https://simonwillison.net/atom/everything/
    max_items: 4

news_feeds:
  domestic:
    - id: google-news-domestic
      name: Google News 国内
      url: https://news.google.com/rss/search?q=when:24h+国内新闻&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
      max_items: 20
    - id: google-news-china
      name: Google News 中国
      url: https://news.google.com/rss/search?q=when:24h+中国&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
      max_items: 20
    - id: china-news-scroll
      name: 中新网滚动
      url: https://www.chinanews.com.cn/rss/scroll-news.xml
      max_items: 12
  international:
    - id: google-news-world-zh
      name: Google News 国际
      url: https://news.google.com/rss/search?q=when:24h+国际新闻&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
      max_items: 20
    - id: google-news-world-en
      name: Google News World
      url: https://news.google.com/rss/search?q=when:24h+world&hl=en-US&gl=US&ceid=US:en
      max_items: 20
    - id: bbc-world
      name: BBC World
      url: https://feeds.bbci.co.uk/news/world/rss.xml
      max_items: 10
    - id: le-monde-international
      name: Le Monde International
      url: https://www.lemonde.fr/en/international/rss_full.xml
      max_items: 10

game_news_feeds:
  - id: google-news-games
    name: Google News 游戏
    url: https://news.google.com/rss/search?q=when:7d+游戏+新闻&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 12
  - id: google-news-steam
    name: Google News Steam
    url: https://news.google.com/rss/search?q=when:7d+Steam+游戏&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 12
  - id: google-news-console
    name: Google News 主机游戏
    url: https://news.google.com/rss/search?q=when:7d+主机游戏&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 12

entertainment_feeds:
  - id: google-news-ent-games
    name: Google News 游戏
    url: https://news.google.com/rss/search?q=when:3d+游戏+新闻&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 10
  - id: google-news-ent-steam
    name: Google News Steam
    url: https://news.google.com/rss/search?q=when:3d+Steam+游戏&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 8
  - id: google-news-ent-console
    name: Google News 主机游戏
    url: https://news.google.com/rss/search?q=when:3d+主机游戏&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 8
  - id: google-news-ent-drama
    name: Google News 影视剧综
    url: https://news.google.com/rss/search?q=when:3d+影视+剧集+综艺&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
    max_items: 10
  - id: google-news-ent-anime
    name: Google News 动漫二次元
    url: https://news.google.com/rss/search?q=when:3d+动漫+二次元&hl=zh-CN&gl=CN&ceid=CN:zh-Hans
